<!DOCTYPE html>
<html lang="zh-CN">
<head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no,viewport-fit=cover">
<title>星空相册</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000}
canvas{display:block;width:100%;height:100%;cursor:grab;touch-action:none}
canvas:active{cursor:grabbing}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:100;justify-content:center;align-items:center}
.overlay.show{display:flex}
.overlay-close{position:fixed;top:20px;right:20px;width:44px;height:44px;background:rgba(0,0,0,.5);border:2px solid rgba(167,139,250,.5);border-radius:50%;color:#c4b5fd;font-size:22px;cursor:pointer;z-index:200;transition:all .3s;display:flex;align-items:center;justify-content:center;line-height:1;backdrop-filter:blur(10px)}
.overlay-close:hover{background:rgba(167,139,250,.4);border-color:#a78bfa;color:#fff;transform:rotate(90deg) scale(1.1)}
.modal-body{display:flex;width:85vw;height:75vh;gap:40px;align-items:center;animation:popIn .4s ease}
.modal-left{flex:1;display:flex;justify-content:center;align-items:center;min-height:0}
.modal-left canvas{max-width:100%;max-height:100%;border-radius:16px;box-shadow:0 0 60px rgba(100,100,255,.3)}
.modal-right{flex:0 0 340px;display:flex;flex-direction:column;justify-content:center;gap:18px}
.modal-right h2{font-size:1.8em;font-weight:600;color:#fff;margin:0}
.modal-right h2[contenteditable=true]{outline:none;border-bottom:1px solid rgba(167,139,250,.3);padding-bottom:4px;transition:border-color .3s}
.modal-right h2[contenteditable=true]:focus{border-bottom-color:#a78bfa}
.modal-right .desc-area{font-size:1em;color:rgba(255,255,255,.6);line-height:1.8;min-height:3em}
.modal-right .desc-area[contenteditable=true]{outline:none;border-bottom:1px solid rgba(167,139,250,.2);padding-bottom:4px;transition:border-color .3s}
.modal-right .desc-area[contenteditable=true]:focus{border-bottom-color:#a78bfa}
.modal-right .edit-hint{font-size:11px;color:rgba(255,255,255,.25);margin-top:4px}
.modal-right .replace-btn{padding:8px 16px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.4);color:#c4b5fd;border-radius:16px;cursor:pointer;font-size:13px;transition:all .3s;align-self:flex-start}
.modal-right .replace-btn:hover{background:rgba(167,139,250,.3);color:#fff}
.modal-right .replace-btn:active{transform:scale(.95)}
.modal-nav{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);display:flex;gap:12px;z-index:101}
.modal-nav button{padding:10px 24px;background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);color:#fff;font-size:14px;border-radius:25px;cursor:pointer;transition:all .3s}
.modal-nav button:hover{background:rgba(255,255,255,.2)}
.btn-delete{position:fixed;bottom:30px;right:30px;padding:10px 20px;background:rgba(255,60,60,.15);border:1px solid rgba(255,60,60,.3);color:#ff8888;font-size:13px;border-radius:20px;cursor:pointer;transition:all .3s;z-index:101}
.btn-delete:hover{background:rgba(255,60,60,.3)}
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.hint{position:fixed;bottom:25px;left:50%;transform:translateX(-50%);color:rgba(255,255,255,.4);font-size:13px;z-index:50;pointer-events:none;animation:hintFade 4s ease forwards}
@keyframes hintFade{0%,60%{opacity:1}100%{opacity:0}}
#controls{position:fixed;top:20px;left:20px;z-index:200;display:flex;flex-direction:column;gap:8px}
.ctrl-section{padding:8px 14px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);border-radius:20px;backdrop-filter:blur(10px);display:flex;align-items:center;gap:10px}
.ctrl-toggle{padding:8px 16px;background:rgba(167,139,250,.15);border:1px solid rgba(167,139,250,.4);color:#c4b5fd;border-radius:16px;cursor:pointer;font-size:13px;transition:all .3s;white-space:nowrap}
.ctrl-toggle:hover{background:rgba(167,139,250,.25)}
.ctrl-toggle.active{background:rgba(167,139,250,.35);border-color:#a78bfa;color:#fff}
.ctrl-reset{padding:8px 14px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.12);color:rgba(255,255,255,.7);border-radius:16px;cursor:pointer;font-size:13px;transition:all .3s}
.ctrl-reset:hover{background:rgba(255,255,255,.15);color:#fff}
.ctrl-label{color:rgba(255,255,255,.5);font-size:12px;white-space:nowrap}
.ctrl-slider{-webkit-appearance:none;width:130px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;outline:none}
.ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#a78bfa;border-radius:50%;cursor:pointer}
#upload-area{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:200}
#upload-btn{padding:10px 20px;background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.12);color:#fff;border-radius:20px;cursor:pointer;font-size:13px;transition:all .3s;backdrop-filter:blur(10px)}
#upload-btn:hover{background:rgba(255,255,255,.12)}
#upload-input{display:none}
#star-count{position:fixed;bottom:25px;right:20px;color:rgba(255,255,255,.25);font-size:11px;z-index:50}
#zoom-indicator{position:fixed;bottom:25px;left:20px;color:rgba(255,255,255,.25);font-size:11px;z-index:50}

.search-box{position:fixed;top:20px;right:20px;z-index:200}
.search-input{padding:8px 14px;background:rgba(0,0,0,.5);border:1px solid rgba(167,139,250,.4);color:#c4b5fd;border-radius:16px;font-size:13px;outline:none;width:160px;backdrop-filter:blur(10px);transition:all .3s}
.search-input::placeholder{color:rgba(255,255,255,.3)}
.search-input:focus{border-color:#a78bfa;color:#fff;width:200px}
.search-hidden{display:none!important}
/* ===== 竖屏→横屏引导（手机专用） ===== */
#rotate-hint{display:none;position:fixed;inset:0;background:radial-gradient(ellipse at center,#0a0a20 0%,#000 100%);z-index:9999;flex-direction:column;align-items:center;justify-content:center;gap:24px;text-align:center}
#rotate-hint .phone-icon{width:80px;height:130px;border:4px solid rgba(167,139,250,.6);border-radius:14px;position:relative;animation:phoneRotate 2s ease-in-out infinite}
#rotate-hint .phone-icon::after{content:"";position:absolute;top:10px;left:50%;transform:translateX(-50%);width:35px;height:6px;background:rgba(167,139,250,.4);border-radius:3px}
#rotate-hint .phone-screen{position:absolute;top:22px;left:8px;right:8px;bottom:8px;background:linear-gradient(135deg,rgba(30,20,80,.8),rgba(10,5,40,.9));border-radius:4px;display:flex;align-items:center;justify-content:center}
#rotate-hint .phone-screen span{font-size:28px;opacity:.7}
@keyframes phoneRotate{0%,100%{transform:rotate(0deg)}45%{transform:rotate(0deg)}55%{transform:rotate(90deg)}90%{transform:rotate(90deg)}}
#rotate-hint p{color:rgba(255,255,255,.7);font-size:18px;font-weight:500;letter-spacing:1px;margin:0}
#rotate-hint p.sub{font-size:13px;color:rgba(255,255,255,.35);letter-spacing:0}
/* ===== 移动端横屏适配 ===== */
@media (max-width:1024px) and (max-height:600px),(max-width:900px){
  .hint{font-size:10px;bottom:8px;max-width:85vw;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  #star-count{font-size:10px;bottom:8px;right:8px}
  #zoom-indicator{font-size:10px;bottom:8px;left:8px}
  #controls{top:8px;left:8px;gap:4px}
  .ctrl-section{padding:4px 10px;gap:6px;border-radius:14px}
  .ctrl-toggle{padding:5px 10px;font-size:11px;border-radius:12px}
  .ctrl-reset{padding:5px 10px;font-size:11px;border-radius:12px}
  .ctrl-label{font-size:10px}
  .ctrl-slider{width:80px;height:3px}
  .ctrl-slider::-webkit-slider-thumb{width:12px;height:12px}
  #upload-area{top:8px}
  #upload-btn{padding:6px 14px;font-size:11px;border-radius:14px}
  .search-box{top:8px;right:8px}
  .search-input{padding:5px 10px;font-size:11px;width:110px;border-radius:12px}
  .search-input:focus{width:140px}
  .overlay-close{top:8px;right:8px;width:32px;height:32px;font-size:16px}
  .modal-body{width:92vw;height:80vh;gap:16px;flex-direction:row}
  .modal-right{flex:0 0 200px;gap:10px;min-width:0}
  .modal-right h2{font-size:1.1em}
  .modal-right .desc-area{font-size:0.8em;line-height:1.5;min-height:2em}
  .modal-right .edit-hint{font-size:9px}
  .modal-right .replace-btn{padding:5px 10px;font-size:11px}
  .modal-nav{bottom:12px;gap:8px}
  .modal-nav button{padding:7px 16px;font-size:12px}
  .btn-delete{bottom:12px;right:12px;padding:7px 14px;font-size:11px}
  .modal-left canvas{border-radius:10px;box-shadow:0 0 30px rgba(100,100,255,.3)}
  @keyframes hintFade{0%,40%{opacity:1}100%{opacity:0}}
  .hint{animation:hintFade 3s ease forwards}
}
/* ===== 极端横屏（手机横屏，高度极小）===== */
@media (max-height:450px){
  .hint{bottom:4px;font-size:9px}
  #star-count{bottom:4px;right:4px;font-size:9px}
  #zoom-indicator{bottom:4px;left:4px;font-size:9px}
  #controls{top:4px;left:4px;gap:2px;flex-direction:row;flex-wrap:wrap}
  .ctrl-section{padding:3px 8px;gap:4px;border-radius:10px}
  .ctrl-toggle{padding:3px 8px;font-size:10px;border-radius:10px}
  .ctrl-reset{padding:3px 8px;font-size:10px;border-radius:10px}
  .ctrl-slider{width:60px;height:2px}
  .ctrl-slider::-webkit-slider-thumb{width:10px;height:10px}
  #upload-area{top:4px}
  #upload-btn{padding:4px 10px;font-size:10px}
  .search-box{top:4px;right:4px}
  .search-input{padding:4px 8px;font-size:10px;width:90px}
  .search-input:focus{width:120px}
  .modal-body{width:95vw;height:88vh;gap:10px}
  .modal-right{flex:0 0 150px;gap:6px}
  .modal-right h2{font-size:1em}
  .modal-right .desc-area{font-size:0.7em;line-height:1.3}
  .modal-nav button{padding:5px 12px;font-size:11px}
  .btn-delete{padding:5px 10px;font-size:10px}
}
/* ===== 竖屏手机适配（优先提示横屏） ===== */
@media (max-width:500px) and (orientation:portrait){
  #rotate-hint{display:flex}
  #controls{top:6px;left:6px;gap:4px;flex-direction:row;flex-wrap:wrap}
  .ctrl-section{padding:4px 8px;gap:4px;border-radius:12px}
  .ctrl-toggle{padding:5px 10px;font-size:10px;border-radius:12px}
  .ctrl-reset{padding:5px 10px;font-size:10px;border-radius:12px}
  .ctrl-label{font-size:10px}
  .ctrl-slider{width:60px;height:3px}
  .ctrl-slider::-webkit-slider-thumb{width:11px;height:11px}
  #upload-area{top:6px}
  #upload-btn{padding:6px 12px;font-size:10px;border-radius:14px}
  .search-box{top:6px;right:6px}
  .search-input{padding:5px 10px;font-size:10px;width:100px;border-radius:12px}
  .search-input:focus{width:130px}
  .hint{font-size:10px;bottom:8px;max-width:80vw;white-space:normal;text-align:center}
  .modal-body{flex-direction:column;width:90vw;height:85vh;gap:12px}
  .modal-right{flex:0 0 auto;gap:8px}
  .modal-right h2{font-size:1.2em}
  .modal-right .desc-area{font-size:0.85em}
  .overlay-close{top:8px;right:8px;width:34px;height:34px;font-size:18px}
  .modal-nav{bottom:8px;gap:6px}
  .modal-nav button{padding:6px 14px;font-size:12px}
  .btn-delete{bottom:8px;right:8px;padding:6px 12px;font-size:11px}
  @keyframes hintFade{0%,40%{opacity:1}100%{opacity:0}}
  .hint{animation:hintFade 3s ease forwards}
}
/* ===== 大屏优化 ===== */
@media (min-width:1400px){
  .ctrl-toggle{padding:10px 20px;font-size:15px}
  .ctrl-reset{padding:10px 18px;font-size:15px}
  .ctrl-label{font-size:13px}
  .ctrl-slider{width:180px;height:5px}
  .ctrl-slider::-webkit-slider-thumb{width:16px;height:16px}
  .search-input{padding:10px 18px;font-size:15px;width:200px}
  .search-input:focus{width:260px}
}
/* ===== 触摸设备通用优化 ===== */
@media (hover:none) and (pointer:coarse){
  canvas{cursor:default!important;touch-action:none}
  button,.ctrl-toggle,.ctrl-reset,.overlay-close,.btn-delete,.replace-btn,#upload-btn{cursor:default}
  .overlay-close:hover{transform:none;background:rgba(0,0,0,.5)}
  .overlay-close:active{transform:rotate(90deg) scale(1.1);background:rgba(167,139,250,.4)}
}
</style>
</head>
<body>
<div id="rotate-hint">
  <div class="phone-icon"><div class="phone-screen"><span>⭐</span></div></div>
  <p>请旋转手机</p>
  <p class="sub">横屏浏览体验更佳</p>
</div>
<canvas id="c"></canvas>
<div class="hint" id="hint">拖动旋转 | 点击星星 | 双击强化照片 | 点击标题直接修改 | 右上角按钮</div>
<div id="zoom-indicator">缩放: 1.0x</div>
<div id="star-count"></div>
<div id="controls">
<div class="ctrl-section">
<button class="ctrl-toggle active" id="btn-auto-rotate">自动旋转</button>
<button class="ctrl-reset" id="btn-reset">重置</button>
</div>
<div class="ctrl-section">
<span class="ctrl-label">速度</span>
<input type="range" id="speed-slider" class="ctrl-slider" min="0" max="100" value="20">
<span id="speed-val" class="ctrl-label">0.2x</span>
</div>
<div class="ctrl-section">
<span class="ctrl-label">星星数</span>
<input type="range" id="star-num-slider" class="ctrl-slider" min="32" max="500" value="200">
<span id="star-num-val" class="ctrl-label">200</span>
</div>
</div>
<div id="upload-area"><label id="upload-btn" for="upload-input">上传照片</label><input type="file" id="upload-input" accept="image/*" multiple></div>
<div class="search-box"><input type="text" class="search-input" id="search-input" placeholder="搜索照片..."></div>
<div class="overlay" id="overlay">
<button class="overlay-close" id="closeBtn">&times;</button>
<div class="modal-body">
<div class="modal-left"><canvas id="modalCanvas" width="800" height="600"></canvas></div>
<div class="modal-right">
<h2 id="photoTitle" contenteditable="true"></h2>
<div class="desc-area" id="photoDesc" contenteditable="true"></div>
<label class="replace-btn" id="replaceBtn" for="replace-input">更换照片</label>
<input type="file" id="replace-input" accept="image/*" style="display:none">
<div class="edit-hint">点击标题和描述直接编辑</div>
</div>
</div>
<div class="modal-nav">
<button id="prevBtn">&#8249; 上一张</button>
<button id="nextBtn">下一张 &#8250;</button>
</div>
<button class="btn-delete" id="deleteBtn">删除照片</button>
</div>
<script src="app.js?v=15"></script>
</body>
</html>
